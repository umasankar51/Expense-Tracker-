<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="SignUp.css">
    <title>Document</title>
</head>
<body>
    <nav id="nav">
        <div id="left-nav">
            <div class="u-logo"><a href=""><img src="my logo.png" alt="unisoars" id="logo"></a></div>
            <div class="web-name"><a href="homePage.html" id="WN">UNISOARS</a></div>
        </div>
    
    </nav id="nav">
    <main>
        <div class="sign-up-container">
            <h2>Sign Up</h2>
            <label for="name" class="l-name">Name:</label><br>
            <input type="text" id="name" name="name" required class="input-box"><br>
            <label for="username"  class="l-name">Username:</label><br>
            <input type="text" id="username" name="username" required class="input-box"><br>
            <label for="email" class="l-name">Email:</label><br>
            <input type="email" id="email" name="email" required class="input-box"><br>
            <label for="password" class="l-name">Password:</label><br>
            <input type="password" id="password" name="password" required class="input-box"><br>
            <label for="confirm-password" class="l-name">Confirm Password:</label><br>
            <input type="password" id="confirm-password" name="confirm-password" required class="input-box"><br>
            <button type="submit">Sign Up</button>

        </div>
    </main>
       
    
</body>
</html>
